  <body>
    <h1>Get Dash Project</h1>
    <p>Project Id: <input type="number" id="projId"><button onclick="load()">Load</button></p>
    <div id="root" class="messages">Loading...</div>
  </body>
  <script>
    let metadata = undefined;
    const url = new URL(window.location)
    const sp = url.searchParams
    if (sp.get("id")) {
      document.getElementById('projId').value = sp.get('id')
      load()
    }
    async function load() {
      let uid = document.getElementById('projId').value
      let metadata = undefined;
      let root = document.getElementById('root');
      async function getMeta() {
        metadata = await fetch(`https://shaman2016-trampline.vercel.app/dash/projects/${uid}`)
        metadata = await metadata.json()
      };
      async function getProjData() {
        await getMeta();
        function getDescription() {
          return metadata.project.description.replaceAll('\n', '<br>').replaceAll(/@([\w-]+)/g, (match, group) => `<a href='?id=${group.replace(/\s/g, '')}'>${match}</a>`)
        }
        root.innerHTML = `
          <h1>${metadata.project.name}</h1>
          <iframe src='https://dashblocks.github.io/scratch-gui/embed.html?project_url=https://shaman2016-trampline.vercel.app/dashImage/get-project/${uid}' width="482" height="412" allowtransparency="true" frameborder="0" scrolling="no" allowfullscreen></iframe>
          <p class="message"><b>Description</b><br>${getDescription()}</p>
          <p class="message">${metadata.project.uploadDate}, ${metadata.project.stats.fires}🔥</p>
        `
      };
      await getProjData();
    };
  </script>
