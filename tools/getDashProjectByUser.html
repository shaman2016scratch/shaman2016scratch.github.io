  <body>
    <h1>Get Dash Project By User</h1>
    <p>User: <input type="number" id="userId"><button onclick="load()">Load</button></p>
    <p>Method: <button onclick="document.getElementById('userId').type = 'number'">ID</button><button onclick="document.getElementById('userId').type = 'text'">USERNAME</button></p>
  </body>
  <script>
    const url = new URL(window.location)
    const sp = url.searchParams
    let uid = undefined
    if (sp.get("id") === null) {
      uid = document.getElementById('userId').value
    } else {
      uid = sp.get("id")
    }
    let root = document.body
    if (sp.get("id")) {
      load()
    }
    let metaUser;
    let i;
    async function load() {
      if (sp.get("id") === null) {
        uid = document.getElementById('userId').value
      } else {
        uid = sp.get("id")
      }
      metaUser = await fetch(`https://shaman2016-trampline.vercel.app/dash/users/${uid}`)
      metaUser = await metaUser.json()
      root.innerHTML = `
        <p>Loading projects list</p>
      `
      let fakeRoot = `
        <table>
        <tbody>
        <tr>
      `
      for(i = 0; i < metaUser.user.projects.length || i < 20; i++) {
        if (i < 20) {
          let projectMeta = await fetch(`https://shaman2016-trampline.vercel.app/dash/projects/${metaUser.user.projects[i].id}`)
          projectMeta = await projectMeta.json()
          projectMeta = projectMeta.project
          fakeRoot += `
            <th class="message">
              <img src='https://dashblocks-server.vercel.app/projects/thumbnails/${projectMeta.thumbnailId}' width="100" height="60">
              <p>
                <a href='/tools/getDashProject?id=${uid}'><b>${projectMeta.name}</b></a><br>by <a href="https://shaman2016scratch.github.io/tools/getDashUser?id=${projectMeta.author.username}">
                  ${projectMeta.author.username}
                </a><br>${projectMeta.stats.fires}🔥
              </p>
            </th>
          `
        }
      }
      fakeRoot += `
        </tr>
        </tbody>
        </table>
      `
      root.innerHTML = fakeRoot
    }
  </script>
