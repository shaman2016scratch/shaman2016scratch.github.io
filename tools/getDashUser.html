<html>
  <head>
    <meta charset="UTF-8">
  </head>
  <body>
    <h1>Get Dash User 0.3</h1>
    <p>User Id: <input type="number" id="userId"><button onclick="load()">Load</button></p>
    <div id="root">Loading...</div>
  </body>
  <script>
    let verified = {
      7: 'official',
      8: 'official',
      9: 'official',
      15: 'official',
      17: 'official',
      18: 'official',
      20: 'official',
      21: 'official, MiCloud Creator',
      22: 'official',
      28: 'official'
    }
    async function load() {
      let metadata = undefined;
      let uid = document.getElementById('userId').value;
      let root = document.getElementById('root');
      async function getMeta() {
        let url = `https://shaman2016-trampline.vercel.app/dash/users/${uid}`;
        metadata = await fetch(url); metadata = await metadata.json()
      };
      async function getUserData() {
        await getMeta();
        root.innerHTML = `
          <h1><img src='https://shaman2016-trampline.vercel.app/dashAvatar/${metadata.user.profile.avatarId}'  width='30' height='30'>${metadata.user.username} [${metadata.user.role}, ${verified[uid] || 'not verified'}]</h1>
          <p>${metadata.user.profile.description.replaceAll('\n', '<br>')}</p>
        `
      };
      await getUserData();
    };
  </script>
</html>
