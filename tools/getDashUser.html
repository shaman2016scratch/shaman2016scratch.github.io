<html>
  <head>
    <title>Get User Dash</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap">
    <link rel="stylesheet" href="/tools/css/tbc.css">
  </head>
  <body>
    <h1>Get Dash User 0.3</h1>
    <p>User Id: <input type="number" id="userId"><button onclick="load()">Load</button></p>
    <div id="root" class="messages">Loading...</div>
  </body>
  <script>
    let verified = {
      7: 'official, Creator of this tool',
      8: 'official',
      9: 'official',
      15: 'official, Dash creator, Main developer dash',
      17: 'official',
      18: 'official',
      20: 'official',
      21: 'official, MiCloud Creator',
      22: 'official',
      28: 'official'
    }
    async function load() {
      let metadata = undefined;
      let uid = document.getElementById('userId').value;
      let root = document.getElementById('root');
      async function getMeta() {
        let url = `https://shaman2016-trampline.vercel.app/dash/users/${uid}`;
        metadata = await fetch(url); metadata = await metadata.json()
      };
      async function getUserData() {
        await getMeta();
        function getDate(st) {
          if (st === null) {
            return "date not specified"
          } else {
            return new Date(st).toLocaleDateString()
          }
        }
        root.innerHTML = `
          <h1><img src='https://shaman2016-trampline.vercel.app/dashAvatar/${metadata.user.profile.avatarId}'  width='30' height='30'>${metadata.user.username} [<b>${metadata.user.role}</b>, <b>${verified[uid] || 'not verified'}</b>]</h1>
          <p><b>Joined: ${getDate(metadata.user.joinedAt)}</b> || <b>Last Active: ${getDate(metadata.user.lastActive)}</b></p>
          <p class="message">${metadata.user.profile.description.replaceAll('\n', '<br>')}</p>
        `
      };
      await getUserData();
    };
  </script>
</html>
