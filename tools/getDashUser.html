<html>
  <head>
    <title>Get User Dash</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap">
    <link rel="stylesheet" href="/tools/css/getDashUser.css">
  </head>
  <body>
    <h1>Get Dash User 0.3</h1>
    <p>User Id: <input type="number" id="userId"><button onclick="load()">Load</button></p>
    <p>Method: <button onclick="document.getElementById('userId').type = 'number'">ID</button><button onclick="document.getElementById('userId').type = 'text'">USERNAME</button></p>
    <div id="root" class="messages">Loading...</div>
  </body>
  <script>
    let metadata = undefined;
    const url = new URL(window.location)
    const sp = url.searchParams
    if (sp.get("id")) {
      document.getElementById('userId').value = sp.get('id')
      load()
    }
    let root = document.body
    let verified = {
      7: 'official, Creator of this tool',
      8: 'official',
      9: 'official',
      15: 'official, Dash creator, Main developer dash',
      17: 'official',
      18: 'official',
      20: 'official',
      21: 'official, MiCloud Creator',
      22: 'official',
      28: 'official',
      66: 'Tenge Fun',
      67: 'bad meme',
      68: 'Mr. Eat fun'
    }
    async function load() {
      let uid = document.getElementById('userId').value
      let metadata = undefined;
      let root = document.getElementById('root');
      async function getMeta() {
        metadata = await fetch(`https://shaman2016-trampline.vercel.app/dash/users/${uid}`)
        metadata = await metadata.json()
      };
      async function getUserData() {
        await getMeta();
        function getDate(st) {
          if (st === null) {
            return "date not specified"
          } else {
            return new Date(st).toLocaleDateString()
          }
        }
        function getDesc() {
          if (metadata.user.role === 'dasher') {
            return 'User is not Dasher+'
          } else if (metadata.user.profile.description === '') {
            return '<i>Пусто.</i>'
          } else {
            return metadata.user.profile.description.replaceAll('\n', '<br>')
          }
        }
        root.innerHTML = `
          <h1><img src='https://shaman2016-trampline.vercel.app/dashImage/users/avatars/${metadata.user.profile.avatarId}'  width='30' height='30'>${metadata.user.username} (${metadata.user.id}) [${metadata.user.role}, ${verified[metadata.user.id] || 'account not verified'}]</h1>
          <p><b>Joined: ${getDate(metadata.user.joinedAt)}</b> | <b>Last Active: ${getDate(metadata.user.lastActive)}</b> | <b>Scratch Account: <a href="https://scratch.mit.edu/users/${metadata.user.profile.scratchUsername || 'griffpatch'}">${metadata.user.profile.scratchUsername || "There is no linked account"}</a></b></p>
          <p class="message">${getDesc()}</p>
          <div class="message">
            <h2>Projects (${metadata.user.projects.length})</h2>
            <iframe src='/tools/getDashProjectByUser?id=${uid}' width="810" height="190"></iframe>
          </div>
        `
      };
      await getUserData();
    };
  </script>
</html>
